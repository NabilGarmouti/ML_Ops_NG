services:
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      PYTHONPATH: /app/src
      MODEL_VERSION: docker
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    depends_on:
      - mlflow
